name: Update sitemap.xml

on:
  push:
    branches: [main]
    paths:
      - 'links/site/posts.json'
      - 'links/fb/posts.json'
      - 'scripts/generate_sitemap.py'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate sitemap.xml
        run: python3 scripts/generate_sitemap.py

      - name: Commit changes if any
        run: |
          if git diff --quiet -- sitemap.xml; then
            echo "sitemap.xml unchanged, nothing to commit."
          else
            git config user.name "sitemap-bot"
            git config user.email "actions@users.noreply.github.com"
            git add sitemap.xml
            git commit -m "Auto-update sitemap.xml"
            git push
          fi
