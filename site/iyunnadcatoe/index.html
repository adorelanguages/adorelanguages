<meta name="description" content="ИЮНЬНАДЦАТОЕ. 19 июня каждого года в США отмечается национальный праздник Juneteenth, название которого образовано слиянием слов June («июнь») и nineteenth («девятнадцатое»). Он чтит память о дне 1865 года, когда в Техасе было объявлено об освобождении последних порабощённых афроамериканцев. По сути, это праздник, посвящённый окончанию рабства в США, так что альтернативное его название – Freedom Day («День Свободы»). Отмечать его начали уже в 1866 году. Но статус федерального праздника он получил недавно – только в 2021 году.">
