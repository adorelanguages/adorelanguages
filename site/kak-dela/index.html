<meta name="description" content="КАК ДЕЛА? Буквальное значение этого дежурного вопроса не во всех языках одинаково и порой может удивлять. Не знаю, использует ли кто-то ещё, кроме нас, слово «дела» в этом контексте. Стандартное английское How are you? подобно нашему «Как ты?». Обычное немецкое Wie geht's? – буквально «Как оно идёт?» – похоже на наше «Как оно?». Русинское Як ся маєш? дословно – «Как ты имеешься?». Греки спрашивают «Что ты делаешь?»: τι κάνεις, а англичане – «Как ты делаешь?»: How are you doing? Французы спрашивают «Как ты идёшь?»: Comment vas-tu?, а адыги – «Как ты стоишь?»: Дауэ ущыт?. У эстонцев же принято интересоваться: «Как руке ходится?»: Kuidas käsi käib?">
