<meta name="description" content="СЛУШАЙ! Многие бренды — памятники тщеславию основателей соответствующих компаний. Audi — не исключение. Немецкий инженер-механик Август Хорьх создал своё первое автостроительное предприятие в 1899 г. и назвал его в свою честь August Horch & Cie. Спустя несколько лет он разругался с советом директоров, покинул компанию и основал новый бизнес. А поскольку название «Horch» уже было занято и права на него принадлежали другим людям, то самолюбивый Август просто перевёл свою фамилию на латынь. Немецкий глагол «horchen» значит «прислушиваться». В повелительном наклонении это «horch!» — «слушай!»; на латыни — «audī!». Так что если у вас тут возникали ассоциации со словом «аудио», то это неспроста.">
