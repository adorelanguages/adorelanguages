<meta name="description" content="ЦЕЛУЮ. Прощаясь с близкими по телефону, мы часто говорим «целую» – да и при встрече мы их обычно чмокаем в щёку. В Турции же старшим родственникам – родителям, бабушкам, дедушкам и пр. – принято целовать руку или прикладывать к их руке лоб. Поэтому и когда оканчивают телефонный разговор, говорят ellerinden öperim – «целую твои руки». А со стороны старших по отношению к младшим (в основном, к детям) нежная привязанность проявляется фразой gözlerinden öperim – «целую твои глаза». Или ребёнку ещё могут ласково сказать yerim seni – «съем тебя», что тоже является только проявлением любви.">
