<meta name="description" content="ВРОВЕНЬ СОЛНЦУ. В осетинском языке быть известным, знаменитым значит быть «равным солнцу» – хуры æмсæр. Мишель Обама, Адель, Лионель Месси – все они «равны солнцу». Хур на осетинском – «солнце». А вот прилагательное æмсæр очень интересное. Оно состоит из корня сæр – «голова» и приставки æм-, которая показывает равенство двух людей по какому-то признаку. Причём употреблять его можно только при сравнении положительных человеческих качеств. Например, «она умная как мать» будет зондæй йæ мады æмсæр у (дословно, «по уму она матери вровень»). А вот, скажем, предложение «он такой же лентяй как его отец» с этим словом составить было бы нельзя – потому что речь о негативном качестве. И «такой же красавец как старший брат» тоже нельзя – потому что это о внешности.">
