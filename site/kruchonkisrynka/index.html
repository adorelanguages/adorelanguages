<meta name="description" content="КРУЧЁНКИ С РЫНКА. В детстве казалось, что крендели с ярмарки – это что-то такое прямо исконно русское. Но потом выяснилось, что речь тут о чистой воды германизмах. Немецкое слово Jahrmarkt буквально значит «рынок года» (Jahr – год, Markt – рынок). А «крендель» мы испекли из немецкого Kringel (от глагола kringeln – «скручивать»).">
