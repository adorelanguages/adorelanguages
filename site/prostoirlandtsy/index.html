<meta name="description" content="ПРОСТО ИРЛАНДЦЫ. Допустим, вы неплохо говорите по-английски. Приезжаете в Ирландию. Замечаете непривычный акцент, но это не беда – понять людей с грехом пополам можно, и вас тоже понимают без труда. Но вскоре вы сталкиваетесь с именами новых коллег – и вот тут наступает веселье! Советуют обратиться к Рори или к Шивон – вы ищете и не находите в адресной книге ни Rory, ни Shivon – вам терпеливо объясняют, что имена пишутся Ruaidhri и Siobhán. Ах да, конечно, как я сам не догадался! Вам звонит человек по имени Сайв и просит, чтобы с ним связался Оши. Вы уже уяснили, что это не Oshi, а, разумеется, Oisín. Но в ответ на вашу записку он вас вежливо поправляет, что перезвонить он должен не Sive, а Sadhbh. Клиана, понятное дело, пишется Clíodhna, Кыива – Caoimhe, Лиша – Laoise, а Фиа – Fiadh. Караул!!!">
