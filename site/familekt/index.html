<meta name="description" content="ФАМИЛЕКТ. Почти в каждой семье есть выражения, принятые и понятные только в этом узком кругу. Порой они возникают в результате оговорок, над которыми вся семья смеётся и которые потом все используют уже намеренно. Иногда члены семьи изобретают собственные, несуществующие слова. Очень часто подобные «неологизмы» рождаются из-за неверного употребления обычных слов детьми, учащимися говорить. Уникальный набор этих особых оборотов речи называется фамилектом (вроде диалекта в рамках одной семьи). Например, мой американский друг, изучавший русский, как-то назвал животных «животники». С тех пор они у нас именуются только так. Мой дядя говорил, что он «тыбик» – потому что жена часто просила его: «Ты бы сделал то-то и то-то». А моя маленькая дочка подарила нам глагол «имедовать» (иметь в виду).">
