<meta name="description" content="Английское выражение to make a beeline for – дословно, «проложить пчелиную линию» к чему-то или кому-то – значит быстро направиться к предмету или человеку по кратчайшему пути. Например: He made a beeline for the boss. – «Он сразу направился к начальнику». Или: Kids made a beeline for the candy. – «Дети рванули прямо к конфетам». Эта идиома, вероятно, основана на наблюдении, что пчёлы, возвращаясь с добытым нектаром, летят к своему улью без обходных путей, почти по прямой. Легко себе представить, что бренд «Билайн» возник именно отсюда. А то, что мобильная связь на русском называется «сотовой», удачно дополнило пчелиный образ.">
