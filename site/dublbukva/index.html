<meta name="description" content="ДУБЛЬ-БУКВА. BMW – эту аббревиатуру знают все. Но, возможно, не все знают, что она расшифровывается как Bayerische Motoren Werke, то есть Баварские Моторные Заводы. Хотя наш язык и использует кириллицу, а не латиницу, название прославленного бренда мы произносим вполне близко к оригиналу. У некоторых других есть сложности. В английском буква W – «двойная U», так что BMW произносится как «Би-Эм-Дабл-Ю». Во французском W – это «двойная V», так что во Франции название марки машин звучит как «Бэ-Эм-Дубль-Вэ».">
