<meta name="description" content="БАБУШКАЦИЯ. Изначально этот пост должен был рассказать исключительно о мурмурации. Данный термин описывает дивное явление скоординированного полёта огромных стай птиц. Они синхронно меняют траекторию движения, образуя в небе живые, текучие, будто пульсирующие фигуры. Пролетают сквозь друг друга на большой скорости без столкновений. Порой разделяются на части и вновь соединяются. Слово «мурмурация» (от англ. murmuration) – звукоподражательное. В его основе – имитация шума многочисленных крыльев: «мурмур». И вот тут-то мне вспомнилось, что в шведском языке «мур» (mor) – это «мама», а «мурмур» (mormor) – бабушка, мамина мама. И подумалось вдруг, что «мурмурация», вероятно, должна звучать для шведов довольно забавно.">
