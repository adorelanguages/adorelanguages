<meta name="description" content="В древнеславянском языке у каждой буквы было своё название: «А» – «аз», «Б» – «буки», «В» – «веди», «Г» – «глаголь», «Д» – «добро» и т.д. Благодаря сложению первых двух названий возникло наше слово «азбука». То есть по сути это слово просто значит АБ. Идея именно так именовать совокупность всех букв языка, расположенных в установленном порядке, была заимствована Кириллом и Мефодием из греческой традиции. Слово αλφάβητος – «алфавит» – точно так же произошло от названий первых двух букв греческой письменности: «альфа» и «бета». В словаре В. Даля в качестве синонима «азбуки» приводится ещё «абевега». Немцы тоже алфавит могут назвать «абецэ», англичане – «эйбиси», итальянцы – «абечедарио» и пр.">
