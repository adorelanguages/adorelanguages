<meta name="description" content="Слово «шлагбаум» – немецкое. Первая его часть – корень глагола «бить, ударять» (schlagen), а вторая – существительное «дерево» (Baum). Очевидно, делались шлагбаумы раньше из стволов деревьев и замешкавшись или, наоборот, задумав быстро проскочить, немудрено было схлопотать по темечку… В современном немецком это слово считается устаревшим, чаще теперь используют «Schranke».">
