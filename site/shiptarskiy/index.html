<meta name="description" content="ШИПТАРСКИЙ. Албанский, как и русский, принадлежит к индоевропейской языковой семье. Сами албанцы давно называют себя shqiptar. Соответственно, славянизированная форма этого эндонима (самоназвания) албанцев – «шиптары». По сравнению с базовым латинским алфавитом, в албанском на 10 букв больше (36 вместо 26). Буква w не используется. Есть пара букв с диакритиками, причём одна из них нам хорошо знакома по кириллице: ç, ë. Но любопытно то, что помимо этого существуют ещё девять спаренных букв: dh, gj, ll, nj, rr, sh, th, xh, zh. У каждого такого сочетания – своё отдельное специфическое произношение. И в албанских словарях у каждого из них – собственный раздел. К примеру, слова, начинающиеся с th не найти в разделе, посвящённом букве t.">
