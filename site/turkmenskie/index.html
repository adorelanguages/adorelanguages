<meta name="description" content="ТУРКМЕНСКИЕ названия месяцев сейчас – те же заимствования, что и в русском. Но с 2002 по 2008 год ситуация выглядела иначе. Правил Туркменистаном тогда скромный человек по фамилии Ниязов, называвший себя «Отец всех туркмен» (Туркменбаши), «Великий вождь» или просто «Очеловеченный символ Туркмении». Помимо скромности Ниязов отличался ещё и незаурядной креативностью, так что народ был осчастливлен массой новшеств. К примеру, месяцы были переименованы. Январь стал называться в честь президента Туркменбаши, апрель получил имя его матери, а слово «сентябрь» заменили названием его книги, изучение которой было обязательным для всех граждан.">
