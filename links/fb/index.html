<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Посты в Фейсбуке — Обожаю Языки</title>
  <meta name="description" content="Список всех постов блога «Обожаю Языки» в Facebook: этимология слов, идиомы, языковые факты и курьёзы — с поиском по тегам и названию.">

  <style>
    @font-face { font-family: 'Factora'; src: url('../../FACTORA-REGULAR.OTF'); font-weight: normal; }
    @font-face { font-family: 'Factora'; src: url('../../FACTORA-BOLD.OTF'); font-weight: bold; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Factora', Georgia, serif;
      background: #ffffff;
      color: rgb(45, 44, 91);
      padding: 40px 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .home-button {
      font-family: 'Factora', Georgia, serif;
      font-size: 1em;
      color: #fff;
      background: rgb(45, 44, 91);
      padding: 14px 10px;
      border-radius: 18px;
      text-decoration: none;
      display: inline-block;
      width: 130px;
      box-sizing: border-box;
      text-align: center;
      line-height: 1.3;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .home-button .arrow { margin-right: 4px; }

    /* Заголовок теперь многострочный */
    h1 {
      font-size: 1.8em;
      line-height: 1.25;
      margin-bottom: 6px;
      display: block;
    }

    .count {
      font-size: 1em;
      font-weight: bold;
      color: rgb(45, 44, 91);
    }

    .toggle {
      margin: 20px 0 24px;
      font-size: 0.95em;
    }

    .toggle a {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgb(45, 44, 91);
      margin-right: 10px;
      text-decoration: none;
      color: rgb(45, 44, 91);
      display: inline-block;
    }

    .toggle a.active {
      background: rgb(45, 44, 91);
      color: white;
    }

    input {
      width: 100%;
      max-width: 600px;
      padding: 12px 16px;
      font-size: 1em;
      border: 2px solid rgb(45, 44, 91);
      border-radius: 8px;
      margin-bottom: 32px;
      font-family: 'Factora', Georgia, serif;
      color: rgb(45, 44, 91);
      outline: none;
    }

    .list { max-width: 600px; display: flex; flex-direction: column; gap: 2px; }

    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 4px;
    }

    .bullet {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgb(45, 44, 91);
      flex-shrink: 0;
    }

    .item .title { flex: 1; font-size: 1em; }
    .item .title a { color: rgb(45, 44, 91); text-decoration: none; }
    .item .title a:hover { text-decoration: underline; }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1em;
      color: rgb(45, 44, 91);
      padding: 4px 8px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .copy-btn:hover { background: rgb(244,244,255); }

    .hidden { display: none; }

    .searchRow {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .searchRow input {
      margin-bottom: 0;
      flex: 1;
    }

    #clearFilter {
      display: none;
      margin: 0;
    }

    #clearFilter button {
      font-family: 'Factora', Georgia, serif;
      font-size: 1em;
      padding: 12px 18px;
      border: 2px solid rgb(45, 44, 91);
      border-radius: 8px;
      background: white;
      color: rgb(45, 44, 91);
      cursor: pointer;
      white-space: nowrap;
    }

    #clearFilter button:hover {
      background: rgb(45, 44, 91);
      color: white;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <h1>
      Посты в<br>
      фейсбуке <span class="count" id="postCount"></span>
    </h1>

    <a class="home-button" href="https://adorelanguages.com">
      <span class="arrow">←</span>На главную<br>страницу
    </a>
  </div>

  <div class="toggle">
    <a href="/links/fb/" class="active">Поиск</a>
    <a href="/links/fb/all/">Обзор постов</a>
  </div>

  <div class="searchRow">
    <input type="text" id="search" placeholder="Поиск по тегам или названию..." oninput="filter()">
    <p id="clearFilter">
      <button type="button" onclick="clearFilter()">✖ Сбросить фильтр</button>
    </p>
  </div>

  <div class="list" id="list"></div>

  <script>
    let allPosts = [];

    async function loadPosts() {
      const response = await fetch('./posts.json');
      allPosts = await response.json();
      document.getElementById('postCount').textContent = `(${allPosts.length})`;
      renderPosts();
    }

    function renderPosts() {
      const list = document.getElementById('list');
      list.innerHTML = '';

      const sortedPosts = [...allPosts].sort((a, b) =>
        a.title.localeCompare(b.title, 'ru')
      );

      sortedPosts.forEach(post => {
        const item = document.createElement('div');
        item.className = 'item hidden';
        item.dataset.tags = post.tags.join(' ');
        item.dataset.title = post.title.toLowerCase();

        const url = `https://adorelanguages.com/fb/${post.slug}`;

        item.innerHTML = `
          <span class="bullet"></span>
          <span class="title"><a href="${url}">${post.title}</a></span>
          <button class="copy-btn" title="Скопировать ссылку" onclick="copyLink('${url}', this)">📋</button>
        `;

        list.appendChild(item);
      });
    }

    function filter() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      const clear = document.getElementById('clearFilter');
      clear.style.display = q ? 'block' : 'none';

      document.querySelectorAll('.item').forEach(item => {
        const tags = item.dataset.tags.toLowerCase();
        const title = item.dataset.title;
        const matches = q && (tags.includes(q) || title.includes(q));
        item.classList.toggle('hidden', !matches);
      });
    }

    function clearFilter() {
      const search = document.getElementById('search');
      search.value = '';
      filter();
    }

    function copyLink(url, btn) {
      navigator.clipboard.writeText(url).then(() => {
        const original = btn.textContent;
        btn.textContent = '✓';
        setTimeout(() => { btn.textContent = original; }, 1200);
      });
    }

    loadPosts().then(() => {
      const params = new URLSearchParams(location.search);
      const tag = params.get('tag');
      if (tag) {
        document.getElementById('search').value = tag;
        filter();
      }
    });
  </script>

</body>
</html>
