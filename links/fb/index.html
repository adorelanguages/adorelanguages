<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Посты в ФБ</title>
  <style>
    @font-face { font-family: 'Factora'; src: url('../../FACTORA-REGULAR.OTF'); font-weight: normal; }
    @font-face { font-family: 'Factora'; src: url('../../FACTORA-BOLD.OTF'); font-weight: bold; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Factora', Georgia, serif; background: #ffffff; color: rgb(45, 44, 91); padding: 40px 20px; }
    h1 { font-size: 1.8em; margin-bottom: 8px; }
    .switch { margin-bottom: 24px; font-size: 0.95em; }
    .switch a { color: rgb(45, 44, 91); }
    input {
      width: 100%; max-width: 600px; padding: 12px 16px;
      font-size: 1em; border: 2px solid rgb(45, 44, 91);
      border-radius: 8px; margin-bottom: 32px;
      font-family: 'Factora', Georgia, serif;
      color: rgb(45, 44, 91); outline: none;
    }
    .list { max-width: 600px; display: flex; flex-direction: column; gap: 10px; }
    .item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px;
    }
    .item .title { font-size: 1.05em; }
    .copy-btn {
      background: none; border: none; cursor: pointer;
      font-size: 1.2em; color: rgb(45, 44, 91);
      padding: 4px 8px; border-radius: 6px; flex-shrink: 0;
    }
    .copy-btn:hover { background: rgb(244,244,255); }
    .hidden { display: none; }
    .searchRow {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .searchRow input {
      margin-bottom: 0;
      flex: 1;
    }
    #clearFilter {
      display: none;
      margin: 0;
    }
    #clearFilter button {
      font-family: 'Factora', Georgia, serif;
      font-size: 1em;
      padding: 12px 18px;
      border: 2px solid rgb(45, 44, 91);
      border-radius: 8px;
      background: white;
      color: rgb(45, 44, 91);
      cursor: pointer;
      white-space: nowrap;
    }
    #clearFilter button:hover {
      background: rgb(45, 44, 91);
      color: white;
    }
  </style>
</head>
<body>
  <h1>Посты в ФБ</h1>
  <p class="switch">→ <a href="/links/site">Посмотреть посты на сайте</a></p>

  <div class="searchRow">
    <input type="text" id="search" placeholder="Поиск по тегам или названию..." oninput="filter()">
    <p id="clearFilter">
      <button type="button" onclick="clearFilter()">✖ Сбросить фильтр</button>
    </p>
  </div>

  <div class="list" id="list"></div>

  <script>
    let allPosts = [];

    async function loadPosts() {
      const response = await fetch('./posts.json');
      allPosts = await response.json();
      renderPosts();
    }

    function renderPosts() {
      const list = document.getElementById('list');
      list.innerHTML = '';

      const sortedPosts = [...allPosts].sort((a, b) =>
        a.title.localeCompare(b.title, 'ru')
      );

      sortedPosts.forEach(post => {
        const item = document.createElement('div');
        item.className = 'item hidden';
        item.dataset.tags = post.tags.join(' ');
        item.dataset.title = post.title.toLowerCase();

        const url = `https://adorelanguages.com/fb/${post.slug}`;

        item.innerHTML = `
          <span class="title">${post.title}</span>
          <button class="copy-btn" title="Скопировать ссылку" onclick="copyLink('${url}', this)">📋</button>
        `;

        list.appendChild(item);
      });
    }

    function filter() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      const clear = document.getElementById('clearFilter');
      clear.style.display = q ? 'block' : 'none';

      document.querySelectorAll('.item').forEach(item => {
        const tags = item.dataset.tags.toLowerCase();
        const title = item.dataset.title;
        const matches = q && (tags.includes(q) || title.includes(q));
        item.classList.toggle('hidden', !matches);
      });
    }

    function clearFilter() {
      const search = document.getElementById('search');
      search.value = '';
      filter();
    }

    function copyLink(url, btn) {
      navigator.clipboard.writeText(url).then(() => {
        const original = btn.textContent;
        btn.textContent = '✓';
        setTimeout(() => { btn.textContent = original; }, 1200);
      });
    }

    loadPosts();
  </script>
</body>
</html>
