<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Все посты (Facebook) — Обожаю Языки</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  @font-face { font-family: 'Factora'; src: url('/FACTORA-REGULAR.OTF'); font-weight: normal; }
  @font-face { font-family: 'Factora'; src: url('/FACTORA-BOLD.OTF'); font-weight: bold; }

  body {
    font-family: -apple-system, Segoe UI, sans-serif;
    background: #faf9f7;
    color: #1f1e2e;
    margin: 0;
    padding: 32px 20px 60px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  a { color: rgb(45,44,91); text-decoration: none; }

  .topbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }

  .home-button {
    font-family: 'Factora', Georgia, serif;
    font-size: 1em;
    color: #fff;
    background: rgb(45, 44, 91);
    padding: 14px 10px;
    border-radius: 18px;
    text-decoration: none;
    display: inline-block;
    width: 130px;
    box-sizing: border-box;
    text-align: center;
    line-height: 1.3;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .home-button .arrow { margin-right: 4px; }

  .toggle { margin-bottom: 20px; }
  .toggle a {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid #d8d6e8;
    margin-right: 10px;
    display: inline-block;
  }
  ul { padding-left: 20px; }
  h2 { margin: 0 0 8px; }

  .letter-group { margin-top: 28px; }
  .letter-group:first-of-type { margin-top: 12px; }

  .letter-badge {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Factora', Georgia, serif;
    font-weight: bold;
    font-size: 1.05em;
    margin-bottom: 8px;
  }

  .letter-group ul {
    margin: 0;
    padding-left: 20px;
  }
  .letter-group li { margin-bottom: 4px; }
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <h2>Обзор постов в Фейсбуке</h2>
    <a class="home-button" href="https://www.adorelanguages.com"><span class="arrow">←</span>На главную<br>страницу</a>
  </div>

  <div class="toggle">
    <a href="/links/fb/">Поиск</a>
    <a href="/links/fb/all/" style="background: rgb(45,44,91); color: #fff;">Обзор постов</a>
  </div>

  <div id="post-list"></div>

</div>

<script>
  const ALPHABET = 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ';
  const BADGE_COLORS = [
    { bg: '#F4DBCE', text: 'rgb(45,44,91)' },   // 1: розовый
    { bg: '#E9CEF2', text: 'rgb(45,44,91)' },   // 2: сиреневый
    { bg: '#461359', text: 'rgb(129,239,135)' },// 3: тёмно-фиолетовый
    { bg: '#F0F7CD', text: 'rgb(45,44,91)' }    // 4: светло-зелёный
  ];

  function colorForLetter(letter) {
    const idx = ALPHABET.indexOf(letter);
    const colorIndex = idx === -1 ? 0 : idx % 4;
    return BADGE_COLORS[colorIndex];
  }

  fetch('/links/fb/posts.json')
    .then(r => r.json())
    .then(posts => {
      posts.sort((a, b) => a.title.localeCompare(b.title, 'ru'));

      const groups = {};
      posts.forEach(p => {
        const letter = p.title.trim()[0].toUpperCase();
        if (!groups[letter]) groups[letter] = [];
        groups[letter].push(p);
      });

      const container = document.getElementById('post-list');

      Object.keys(groups).forEach(letter => {
        const color = colorForLetter(letter);

        const section = document.createElement('div');
        section.className = 'letter-group';

        const badge = document.createElement('div');
        badge.className = 'letter-badge';
        badge.textContent = letter;
        badge.style.background = color.bg;
        badge.style.color = color.text;
        section.appendChild(badge);

        const ul = document.createElement('ul');
        groups[letter].forEach(p => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="/fb/${p.slug}/">${p.title}</a>`;
          ul.appendChild(li);
        });
        section.appendChild(ul);

        container.appendChild(section);
      });
    });
</script>

</body>
</html>
