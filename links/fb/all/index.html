<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Все посты (Facebook) — Обожаю Языки</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: -apple-system, Segoe UI, sans-serif;
    background: #faf9f7;
    color: #1f1e2e;
    margin: 0;
    padding: 32px 20px 60px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  a { color: rgb(45,44,91); text-decoration: none; }
  .toggle { margin-bottom: 20px; }
  .toggle a {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid #d8d6e8;
    margin-right: 10px;
    display: inline-block;
  }
  ul { padding-left: 20px; }
</style>
</head>

<body>
<div class="wrap">

  <div class="toggle">
    <a href="/links/fb/">Поиск</a>
    <a href="/links/fb/all/" style="background: rgb(45,44,91); color: #fff;">Все посты</a>
  </div>

  <h2>Все посты (Facebook)</h2>

  <ul id="post-list"></ul>

</div>

<script>
  fetch('/posts.json')
    .then(r => r.json())
    .then(posts => {
      posts.sort((a, b) => a.title.localeCompare(b.title, 'ru'));

      const ul = document.getElementById('post-list');

      posts.forEach(p => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="/fb/${p.slug}/">${p.title}</a>`;
        ul.appendChild(li);
      });
    });
</script>

</body>
</html>
