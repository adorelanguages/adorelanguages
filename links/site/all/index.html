<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Все посты — Обожаю Языки</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  @font-face { font-family: 'Factora'; src: url('../../../FACTORA-REGULAR.OTF'); font-weight: normal; }
  @font-face { font-family: 'Factora'; src: url('../../../FACTORA-BOLD.OTF'); font-weight: bold; }

  body {
    font-family: 'Factora', Georgia, serif;
    background: #ffffff;
    color: rgb(45, 44, 91);
    padding: 40px 20px;
  }

  .wrap { max-width: 640px; margin: 0 auto; }

  h1 {
    font-size: 1.8em;
    font-family: 'Factora', Georgia, serif;
    margin-bottom: 8px;
  }

  .toggle {
    margin: 20px 0 24px;
    font-size: 0.95em;
  }
  .toggle a {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid rgb(45, 44, 91);
    margin-right: 10px;
    text-decoration: none;
    color: rgb(45, 44, 91);
    display: inline-block;
  }
  .toggle a.active {
    background: rgb(45, 44, 91);
    color: white;
  }

  ul { padding-left: 20px; }
  li { margin-bottom: 6px; }
  a { color: rgb(45, 44, 91); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>

<body>
<div class="wrap">

  <h1 id="title">Все посты</h1>

  <div class="toggle">
    <a href="/links/site/">Поиск</a>
    <a href="/links/site/all/" class="active">Все посты</a>
  </div>

  <ul id="post-list"></ul>

</div>

<script>
  fetch('/posts.json')
    .then(r => r.json())
    .then(posts => {
      // сортировка по алфавиту
      posts.sort((a, b) => a.title.localeCompare(b.title, 'ru'));

      // динамический заголовок
      const count = posts.length;
      document.getElementById('title').textContent =
        `Все посты (${count} по алфавиту)`;

      // вывод списка
      const ul = document.getElementById('post-list');
      posts.forEach(p => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="/site/${p.slug}/">${p.title}</a>`;
        ul.appendChild(li);
      });
    });
</script>

</body>
</html>
