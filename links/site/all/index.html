<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Все посты — Обожаю Языки</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  @font-face { font-family: 'Factora'; src: url('../../../FACTORA-REGULAR.OTF'); font-weight: normal; }
  @font-face { font-family: 'Factora'; src: url('../../../FACTORA-BOLD.OTF'); font-weight: bold; }

  * { box-sizing: border-box; }

  body {
    font-family: 'Factora', Georgia, serif;
    background: #ffffff;
    color: rgb(45, 44, 91);
    padding: 40px 20px;
  }

  .wrap { max-width: 720px; margin: 0 auto; }

  .topbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }

  .home-button {
    font-family: 'Factora', Georgia, serif;
    font-size: 1em;
    color: #fff;
    background: rgb(45, 44, 91);
    padding: 14px 10px;
    border-radius: 18px;
    text-decoration: none;
    display: inline-block;
    width: 130px;
    box-sizing: border-box;
    text-align: center;
    line-height: 1.3;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .home-button .arrow { margin-right: 4px; }

  h1 {
    font-size: 1.8em;
    font-family: 'Factora', Georgia, serif;
    margin-bottom: 8px;
  }

  .toggle {
    margin: 20px 0 24px;
    font-size: 0.95em;
  }
  .toggle a {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid rgb(45, 44, 91);
    margin-right: 10px;
    text-decoration: none;
    color: rgb(45, 44, 91);
    display: inline-block;
  }
  .toggle a.active {
    background: rgb(45, 44, 91);
    color: white;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
    margin-top: 8px;
  }

  .card {
    text-decoration: none;
    color: rgb(45, 44, 91);
    display: block;
  }

  .card img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 12px;
    display: block;
    background: #f2f1f8;
    box-shadow: 0 2px 6px rgba(45, 44, 91, 0.15);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .card:hover img {
    transform: scale(1.03);
    box-shadow: 0 4px 12px rgba(45, 44, 91, 0.25);
  }

  .card .title {
    margin-top: 8px;
    font-size: 0.95em;
    text-align: center;
    line-height: 1.25;
  }
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <h1 id="title">Все посты</h1>
    <a class="home-button" href="https://www.adorelanguages.com"><span class="arrow">←</span>На главную<br>страницу</a>
  </div>

  <div class="toggle">
    <a href="/links/site/">Поиск</a>
    <a href="/links/site/all/" class="active">Все посты</a>
  </div>

  <div class="grid" id="post-grid"></div>

</div>

<script>
  fetch('/links/site/posts.json')
    .then(r => r.json())
    .then(posts => {
      posts.sort((a, b) => a.title.localeCompare(b.title, 'ru'));

      const count = posts.length;
      document.getElementById('title').textContent =
        `Все посты по алфавиту (${count})`;

      const grid = document.getElementById('post-grid');
      posts.forEach(p => {
        const card = document.createElement('a');
        card.className = 'card';
        card.href = `/site/${p.slug}/`;
        card.innerHTML = `
          <img src="/images/posts/${p.slug}.png" alt="${p.title}" loading="lazy">
          <div class="title">${p.title}</div>
        `;
        grid.appendChild(card);
      });
    });
</script>

</body>
</html>
