<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Языки — Обожаю Языки</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  @font-face { font-family: 'Factora'; src: url('/FACTORA-REGULAR.OTF'); font-weight: normal; }
  @font-face { font-family: 'Factora'; src: url('/FACTORA-BOLD.OTF'); font-weight: bold; }

  * { box-sizing: border-box; }

  body {
    font-family: 'Factora', Georgia, serif;
    background: #ffffff;
    color: rgb(45, 44, 91);
    padding: 40px 20px;
  }

  .wrap { max-width: 720px; margin: 0 auto; }

  .topbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }

  .home-button {
    font-family: 'Factora', Georgia, serif;
    font-size: 1em;
    color: #fff;
    background: rgb(45, 44, 91);
    padding: 14px 10px;
    border-radius: 18px;
    text-decoration: none;
    display: inline-block;
    width: 130px;
    box-sizing: border-box;
    text-align: center;
    line-height: 1.3;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .home-button .arrow { margin-right: 4px; }

  h1 {
    font-size: 1.8em;
    font-family: 'Factora', Georgia, serif;
    margin: 0 0 8px;
  }

  .toggle {
    margin: 20px 0 24px;
    font-size: 0.95em;
  }
  .toggle a {
    padding: 8px 14px;
    border-radius: 999px;
    border: 3px solid rgb(45, 44, 91);
    margin-right: 10px;
    text-decoration: none;
    color: rgb(45, 44, 91);
    display: inline-block;
  }

  .lang-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-width: 320px;
    margin-top: 8px;
  }

  .lang-list a {
    font-family: 'Factora', Georgia, serif;
    font-size: 1.05em;
    font-weight: bold;
    text-decoration: none;
    padding: 14px 22px;
    border-radius: 999px;
    text-align: center;
    display: block;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 2px 6px rgba(45, 44, 91, 0.12);
  }

  .lang-list a:hover {
    transform: scale(1.03);
    box-shadow: 0 4px 12px rgba(45, 44, 91, 0.2);
  }

  .empty {
    font-size: 0.95em;
    opacity: 0.7;
    margin-top: 20px;
  }

  .to-top {
    position: fixed;
    right: 20px;
    bottom: 20px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: rgb(45, 44, 91);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3em;
    text-decoration: none;
    box-shadow: 0 2px 8px rgba(45, 44, 91, 0.35);
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .to-top.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <h1 id="title">Языки</h1>
    <a class="home-button" href="https://www.adorelanguages.com"><span class="arrow">←</span>На главную<br>страницу</a>
  </div>

  <div class="toggle">
    <a href="/links/site/">← Все разделы</a>
    <a href="/links/site/all/">Все посты</a>
  </div>

  <div class="lang-list" id="lang-list"></div>
  <p class="empty" id="empty-msg" style="display:none;">Пока здесь нет языков — скоро появятся!</p>

</div>

<a href="#" class="to-top" id="to-top" aria-label="Наверх">↑</a>

<script>
  const toTopBtn = document.getElementById('to-top');
  window.addEventListener('scroll', () => {
    toTopBtn.classList.toggle('visible', window.scrollY > 300);
  });
  toTopBtn.addEventListener('click', (e) => {
    e.preventDefault();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
</script>

<script>
  const BADGE_COLORS = [
    { bg: '#F4DBCE', text: 'rgb(45,44,91)' },
    { bg: '#E9CEF2', text: 'rgb(45,44,91)' },
    { bg: '#461359', text: 'rgb(129,239,135)' },
    { bg: '#F0F7CD', text: 'rgb(45,44,91)' }
  ];

  fetch('/links/site/sections.json')
    .then(r => r.json())
    .then(sections => {
      const languages = sections.yazyki.languages || {};
      const langNames = Object.keys(languages).sort((a, b) => a.localeCompare(b, 'ru'));

      document.getElementById('title').textContent = `Языки (${langNames.length})`;

      const list = document.getElementById('lang-list');
      document.getElementById('empty-msg').style.display = langNames.length === 0 ? 'block' : 'none';

      langNames.forEach((lang, i) => {
        const slugs = languages[lang];
        if (!slugs || !slugs.length) return;
        const color = BADGE_COLORS[i % 4];

        const a = document.createElement('a');
        a.href = `/site/${slugs[0]}/`;
        a.textContent = lang.charAt(0).toUpperCase() + lang.slice(1);
        a.style.background = color.bg;
        a.style.color = color.text;

        list.appendChild(a);
      });
    });
</script>

</body>
</html>
