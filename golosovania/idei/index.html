<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Идеи читателей — Обожаю Языки</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Предложи свою идею для нового поста в блоге «Обожаю Языки» и проголосуй за идеи других читателей.">
<link rel="canonical" href="https://adorelanguages.com/golosovania/idei/">
<link rel="icon" type="image/x-icon" href="/favicon.ico">

<style>
  @font-face { font-family: 'Factora'; src: url('/FACTORA-REGULAR.OTF'); font-weight: normal; }
  @font-face { font-family: 'Factora'; src: url('/FACTORA-BOLD.OTF'); font-weight: bold; }

  * { box-sizing: border-box; }

  body {
    font-family: 'Factora', Georgia, serif;
    background: #ffffff;
    color: rgb(45, 44, 91);
    padding: 40px 20px 80px;
    margin: 0;
  }

  .wrap { max-width: 640px; margin: 0 auto; }

  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

  .home-button {
    font-family: 'Factora', Georgia, serif;
    font-size: 1em;
    color: #fff;
    background: rgb(45, 44, 91);
    padding: 14px 10px;
    border-radius: 18px;
    text-decoration: none;
    display: inline-block;
    width: 130px;
    box-sizing: border-box;
    text-align: center;
    line-height: 1.3;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .home-button .arrow { margin-right: 4px; }

  h1 {
    font-size: 1.8em;
    margin: 0;
    text-align: center;
    flex: 1;
    padding: 0 12px;
  }

  .thumb-link {
    display: block;
    cursor: pointer;
    flex-shrink: 0;
  }
  .thumb {
    width: 96px;
    height: 96px;
    object-fit: cover;
    border-radius: 14px;
    display: block;
    box-shadow: 0 2px 8px rgba(45,44,91,0.25);
    transition: transform 0.15s ease;
  }
  .thumb-link:hover .thumb {
    transform: scale(1.03);
  }

  .lightbox-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20,19,40,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 999;
    cursor: pointer;
  }
  .lightbox-overlay.visible {
    display: flex;
  }
  .lightbox-overlay img {
    max-width: 92vw;
    max-height: 90vh;
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  p.lead {
    font-size: 1.05em;
    line-height: 1.5;
    margin: 0 0 8px;
  }

  .submit-box {
    background: rgb(244,244,255);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 8px;
  }

  .submit-box h2 {
    font-size: 1.1em;
    margin: 0 0 12px;
  }

  #idea-input {
    width: 100%;
    min-height: 90px;
    padding: 10px 14px;
    font-size: 1em;
    font-family: 'Factora', Georgia, serif;
    color: rgb(45,44,91);
    border: 2px solid rgb(45,44,91);
    border-radius: 10px;
    resize: vertical;
    outline: none;
    margin-bottom: 12px;
  }

  .btn {
    font-family: 'Factora', Georgia, serif;
    font-size: 0.95em;
    font-weight: bold;
    padding: 10px 22px;
    border-radius: 999px;
    border: none;
    background: rgb(45,44,91);
    color: #fff;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: default; }

  .status-msg {
    margin-top: 10px;
    font-size: 0.9em;
  }
  .status-msg.ok { color: #2f7d4f; }
  .status-msg.err { color: #b33; }

  .idea-table {
    width: 100%;
    border-collapse: collapse;
  }
  .idea-table th {
    text-align: left;
    font-size: 1em;
    font-weight: bold;
    color: rgb(45,44,91);
    padding: 0 10px 6px;
    border-bottom: 1px solid rgb(230,229,240);
  }
  .idea-table th.votes-col {
    text-align: center;
  }
  .idea-table td {
    padding: 7px 10px;
    border-bottom: 1px solid rgb(240,239,247);
    font-size: 1em;
  }
  .idea-table tr:last-child td {
    border-bottom: none;
  }
  .idea-text {
    line-height: 1.35;
  }
  .vote-cell {
    text-align: center;
    white-space: nowrap;
  }
  .vote-trigger {
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .vote-icon {
    display: inline-block;
    width: 18px;
    text-align: center;
  }
  .vote-trigger.disabled {
    cursor: default;
    pointer-events: none;
  }
  .vote-count {
    font-weight: bold;
  }

  .empty, .loading {
    font-size: 0.95em;
    opacity: 0.7;
    margin-top: 8px;
  }
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <a class="thumb-link" id="thumb-link">
      <img class="thumb" src="/images/logo.jpg" alt="Обожаю Языки — логотип, нажми, чтобы увеличить">
    </a>
    <h1 id="title">Идеи читателей</h1>
    <a class="home-button" href="https://adorelanguages.com"><span class="arrow">←</span>На главную<br>страницу</a>
  </div>

  <p class="lead">Предложи идею для нового поста – а пока идея на модерации, проголосуй за идеи других читателей ниже.</p>

  <div class="submit-box">
    <h2>Предложить идею</h2>
    <textarea id="idea-input" maxlength="300" placeholder="Например: идиома, слово или языковой факт, о котором интересно узнать..."></textarea>
    <br>
    <button class="btn" id="submit-btn" onclick="submitIdea()">Отправить</button>
    <div class="status-msg" id="submit-status"></div>
  </div>

  <div class="idea-list" id="idea-list">
    <p class="loading">Загружаю идеи…</p>
  </div>

</div>

<div class="lightbox-overlay" id="lightbox-overlay">
  <img src="/images/logo.jpg" alt="Обожаю Языки — логотип">
</div>

<script>
  const thumbLink = document.getElementById('thumb-link');
  const lightbox = document.getElementById('lightbox-overlay');
  thumbLink.addEventListener('click', (e) => {
    e.preventDefault();
    lightbox.classList.add('visible');
  });
  lightbox.addEventListener('click', () => {
    lightbox.classList.remove('visible');
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') lightbox.classList.remove('visible');
  });

  const API_URL = 'https://script.google.com/macros/s/AKfycbwo0yIv4Fa69mDJJKjdn3w-cUJsvP-XCCJnSAeydgvMBuFhVRxS2qo8fmUk3n3hqBNHjA/exec';
  const VOTED_KEY = 'adore_voted_ideas';

  function getVoted() {
    try {
      return JSON.parse(localStorage.getItem(VOTED_KEY) || '[]');
    } catch (e) {
      return [];
    }
  }

  function markVoted(id) {
    const voted = getVoted();
    voted.push(id);
    localStorage.setItem(VOTED_KEY, JSON.stringify(voted));
  }

  function unmarkVoted(id) {
    const voted = getVoted().filter(v => v !== id);
    localStorage.setItem(VOTED_KEY, JSON.stringify(voted));
  }

  function renderIdeas(ideas) {
    const list = document.getElementById('idea-list');
    list.innerHTML = '';

    if (!ideas.length) {
      list.innerHTML = '<p class="empty">Пока нет одобренных идей – стань первым, кто предложит свою!</p>';
      return;
    }

    const voted = getVoted();

    const table = document.createElement('table');
    table.className = 'idea-table';
    table.innerHTML = `
      <thead>
        <tr><th>Идеи</th><th class="votes-col">Голоса</th></tr>
      </thead>
      <tbody></tbody>
    `;
    const tbody = table.querySelector('tbody');

    ideas.forEach(idea => {
      const alreadyVoted = voted.includes(idea.id);
      const row = document.createElement('tr');
      row.innerHTML = `
        <td class="idea-text"></td>
        <td class="vote-cell">
          <span class="vote-trigger ${alreadyVoted ? 'disabled' : ''}"><span class="vote-icon">👍</span> <span class="vote-count">${idea.votes}</span></span>
        </td>
      `;
      row.querySelector('.idea-text').textContent = idea.text;

      const trigger = row.querySelector('.vote-trigger');
      if (!alreadyVoted) {
        trigger.addEventListener('click', () => vote(idea.id, trigger));
      }

      tbody.appendChild(row);
    });

    list.appendChild(table);
  }

  let pendingRequests = 0;

  function loadIdeas() {
    if (pendingRequests > 0) return; // не перезатирать оптимистичное обновление во время голосования/отправки
    fetch(`${API_URL}?_=${Date.now()}`, { cache: 'no-store' })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          renderIdeas(data.ideas);
        } else {
          document.getElementById('idea-list').innerHTML = '<p class="empty">Не удалось загрузить идеи.</p>';
        }
      })
      .catch(() => {
        document.getElementById('idea-list').innerHTML = '<p class="empty">Не удалось загрузить идеи.</p>';
      });
  }

  function vote(id, trigger) {
    trigger.classList.add('disabled');
    const countEl = trigger.querySelector('.vote-count');
    const originalVotes = parseInt(countEl.textContent, 10) || 0;
    countEl.textContent = originalVotes + 1;
    markVoted(id);

    pendingRequests++;
    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'vote', id: id })
    })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          countEl.textContent = data.votes;
        } else {
          countEl.textContent = originalVotes;
          trigger.classList.remove('disabled');
          unmarkVoted(id);
        }
      })
      .catch(() => {
        countEl.textContent = originalVotes;
        trigger.classList.remove('disabled');
        unmarkVoted(id);
      })
      .finally(() => { pendingRequests--; });
  }

  function submitIdea() {
    const input = document.getElementById('idea-input');
    const status = document.getElementById('submit-status');
    const btn = document.getElementById('submit-btn');
    const text = input.value.trim();

    if (!text) {
      status.textContent = 'Сначала напиши идею.';
      status.className = 'status-msg err';
      return;
    }

    btn.disabled = true;
    input.value = '';
    status.textContent = 'Спасибо! Идея отправлена на модерацию.';
    status.className = 'status-msg ok';

    pendingRequests++;
    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'submit', text: text })
    })
      .then(r => r.json())
      .then(data => {
        btn.disabled = false;
        if (!data.ok) {
          status.textContent = 'Что-то пошло не так, попробуй ещё раз.';
          status.className = 'status-msg err';
          input.value = text;
        }
      })
      .catch(() => {
        btn.disabled = false;
        status.textContent = 'Не удалось отправить, попробуй ещё раз.';
        status.className = 'status-msg err';
        input.value = text;
      })
      .finally(() => { pendingRequests--; });
  }

  loadIdeas();

  setInterval(loadIdeas, 15000);

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      loadIdeas();
    }
  });
</script>

</body>
</html>
