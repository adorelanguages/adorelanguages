<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Голосования — Обожаю Языки</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Голосования читателей блога «Обожаю Языки»: предлагай варианты и голосуй за понравившиеся.">
<link rel="canonical" href="https://adorelanguages.com/golosovania/">
<link rel="icon" type="image/x-icon" href="/favicon.ico">

<style>
  @font-face { font-family: 'Factora'; src: url('/FACTORA-REGULAR.OTF'); font-weight: normal; }
  @font-face { font-family: 'Factora'; src: url('/FACTORA-BOLD.OTF'); font-weight: bold; }

  * { box-sizing: border-box; }

  body {
    font-family: 'Factora', Georgia, serif;
    background: #ffffff;
    color: rgb(45, 44, 91);
    padding: 40px 20px 80px;
    margin: 0;
  }

  .wrap { max-width: 640px; margin: 0 auto; }

  .topbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }

  .home-button {
    font-family: 'Factora', Georgia, serif;
    font-size: 1em;
    color: #fff;
    background: rgb(45, 44, 91);
    padding: 14px 10px;
    border-radius: 18px;
    text-decoration: none;
    display: inline-block;
    width: 130px;
    box-sizing: border-box;
    text-align: center;
    line-height: 1.3;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .home-button .arrow { margin-right: 4px; }

  h1 { font-size: 1.8em; margin: 0 0 8px; }

  p.lead {
    font-size: 1.05em;
    line-height: 1.5;
    margin: 0 0 28px;
  }

  .poll-list { display: flex; flex-direction: column; gap: 20px; }

  .poll-row {
    display: flex;
    align-items: center;
    gap: 16px;
    text-decoration: none;
    color: rgb(45,44,91);
  }

  .poll-thumb {
    width: 72px;
    height: 72px;
    object-fit: cover;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(45,44,91,0.25);
    flex-shrink: 0;
    display: block;
    transition: transform 0.15s ease;
  }
  .poll-row:hover .poll-thumb {
    transform: scale(1.03);
  }

  .poll-title {
    font-size: 1.3em;
    font-weight: bold;
  }

  .empty {
    font-size: 0.95em;
    opacity: 0.7;
  }
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <h1>Голосования</h1>
    <a class="home-button" href="https://adorelanguages.com"><span class="arrow">←</span>На главную<br>страницу</a>
  </div>

  <p class="lead">Здесь собраны все голосования читателей блога «Обожаю Языки» – предлагай свои варианты и голосуй за понравившиеся.</p>

  <div class="poll-list" id="poll-list">
    <a class="poll-row" href="/golosovania/idei/">
      <img class="poll-thumb" src="/images/logo.jpg" alt="Обожаю Языки — логотип">
      <span class="poll-title">Идеи для постов</span>
    </a>
  </div>

</div>

<script>
  // Реестр голосований. Чтобы добавить новое, впиши сюда объект { slug: 'oprosN', title: '...' }
  // и создай страницу golosovania/oprosN/index.html (по образцу golosovania/odnimslovom/).
  // Миниатюра берётся автоматически из /images/posts/<slug>.png
  const POLLS = [
    { slug: 'odnimslovom', title: 'Одним словом' },
  ];

  const list = document.getElementById('poll-list');

  POLLS.forEach(poll => {
    const row = document.createElement('a');
    row.className = 'poll-row';
    row.href = `/golosovania/${poll.slug}/`;
    row.innerHTML = `
      <img class="poll-thumb" src="/images/posts/${poll.slug}.png" alt="">
      <span class="poll-title"></span>
    `;
    row.querySelector('img').alt = `${poll.title} — миниатюра поста`;
    row.querySelector('.poll-title').textContent = poll.title;
    list.appendChild(row);
  });
</script>

</body>
</html>
