<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Голосования — Обожаю Языки</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Голосования читателей блога «Обожаю Языки»: предлагай варианты и голосуй за понравившиеся.">
<link rel="canonical" href="https://adorelanguages.com/golosovania/">
<link rel="icon" type="image/x-icon" href="/favicon.ico">

<style>
  @font-face { font-family: 'Factora'; src: url('/FACTORA-REGULAR.OTF'); font-weight: normal; }
  @font-face { font-family: 'Factora'; src: url('/FACTORA-BOLD.OTF'); font-weight: bold; }

  * { box-sizing: border-box; }

  body {
    font-family: 'Factora', Georgia, serif;
    background: #ffffff;
    color: rgb(45, 44, 91);
    padding: 40px 20px 80px;
    margin: 0;
  }

  .wrap { max-width: 640px; margin: 0 auto; }

  .topbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }

  .home-button {
    font-family: 'Factora', Georgia, serif;
    font-size: 1em;
    color: #fff;
    background: rgb(45, 44, 91);
    padding: 14px 10px;
    border-radius: 18px;
    text-decoration: none;
    display: inline-block;
    width: 130px;
    box-sizing: border-box;
    text-align: center;
    line-height: 1.3;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .home-button .arrow { margin-right: 4px; }

  h1 { font-size: 1.8em; margin: 0 0 8px; }

  p.lead {
    font-size: 1.05em;
    line-height: 1.5;
    margin: 0 0 28px;
  }

  .poll-list { display: flex; flex-direction: column; gap: 12px; }

  .poll-card {
    display: block;
    text-decoration: none;
    color: rgb(45,44,91);
    padding: 18px 20px;
    border-radius: 14px;
    background: #faf9f7;
    box-shadow: 0 2px 6px rgba(45,44,91,0.1);
    transition: box-shadow 0.15s ease;
  }
  .poll-card:hover {
    box-shadow: 0 4px 12px rgba(45,44,91,0.2);
  }

  .poll-title {
    font-size: 1.1em;
    font-weight: bold;
    margin: 0 0 4px;
  }

  .poll-status {
    font-size: 0.85em;
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .poll-status.open {
    background: rgb(230,243,251);
    color: rgb(12,68,124);
  }
  .poll-status.closed {
    background: #eee;
    color: #777;
  }

  .empty {
    font-size: 0.95em;
    opacity: 0.7;
  }

  .toggle {
    margin: 32px 0 0;
    font-size: 0.95em;
  }
  .toggle a {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid rgb(45, 44, 91);
    margin-right: 10px;
    text-decoration: none;
    color: rgb(45, 44, 91);
    display: inline-block;
  }
</style>
</head>

<body>
<div class="wrap">

  <div class="topbar">
    <h1>Голосования</h1>
    <a class="home-button" href="https://adorelanguages.com"><span class="arrow">←</span>На главную<br>страницу</a>
  </div>

  <p class="lead">Здесь собраны все голосования читателей блога «Обожаю Языки» — предлагай свои варианты и голосуй за понравившиеся.</p>

  <div class="poll-list" id="poll-list"></div>

  <div class="toggle">
    <a href="/idei/">Идеи для постов</a>
    <a href="/links/site/">Поиск по постам</a>
  </div>

</div>

<script>
  // Реестр голосований. Чтобы добавить новое, впиши сюда объект
  // { slug: 'oprosN', title: '...', status: 'open' | 'closed' }
  // и создай страницу golosovania/oprosN/index.html (по образцу golosovania/opros1/).
  const POLLS = [
    { slug: 'odnimslovom', title: 'Одним словом', status: 'open' },
  ];

  const list = document.getElementById('poll-list');

  if (!POLLS.length) {
    list.innerHTML = '<p class="empty">Пока нет активных голосований.</p>';
  } else {
    POLLS.forEach(poll => {
      const card = document.createElement('a');
      card.className = 'poll-card';
      card.href = `/golosovania/${poll.slug}/`;
      const statusLabel = poll.status === 'open' ? 'Идёт голосование' : 'Голосование завершено';
      card.innerHTML = `
        <p class="poll-title"></p>
        <span class="poll-status ${poll.status === 'open' ? 'open' : 'closed'}">${statusLabel}</span>
      `;
      card.querySelector('.poll-title').textContent = poll.title;
      list.appendChild(card);
    });
  }
</script>

</body>
</html>
