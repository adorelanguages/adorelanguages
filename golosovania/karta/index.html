<html lang="ru">
<head>
<meta charset="utf-8">
<title>Карта читателей — Обожаю Языки</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Карта читателей блога «Обожаю Языки»: отметь свою страну и город, чтобы появиться на карте.">
<link rel="canonical" href="https://adorelanguages.com/golosovania/karta/">
<link rel="icon" type="image/x-icon" href="/favicon.ico">

<style>
  @font-face { font-family: 'Factora'; src: url('/FACTORA-REGULAR.OTF'); font-weight: normal; }
  @font-face { font-family: 'Factora'; src: url('/FACTORA-BOLD.OTF'); font-weight: bold; }

  * { box-sizing: border-box; }

  body {
    font-family: 'Factora', Georgia, serif;
    background: #ffffff;
    color: rgb(45, 44, 91);
    padding: 40px 20px 80px;
    margin: 0;
  }

  .wrap { max-width: 640px; margin: 0 auto; }

  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

  .home-button {
    font-family: 'Factora', Georgia, serif;
    font-size: 1em;
    color: #fff;
    background: rgb(45, 44, 91);
    padding: 14px 10px;
    border-radius: 18px;
    text-decoration: none;
    display: inline-block;
    width: 130px;
    box-sizing: border-box;
    text-align: center;
    line-height: 1.3;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .home-button .arrow { margin-right: 4px; }

  h1 {
    font-size: 1.8em;
    margin: 0;
    text-align: center;
    flex: 1;
    padding: 0 12px;
  }

  .thumb-link {
    display: block;
    cursor: pointer;
    flex-shrink: 0;
  }
  .thumb {
    width: 96px;
    height: 96px;
    object-fit: cover;
    border-radius: 14px;
    display: block;
    box-shadow: 0 2px 8px rgba(45,44,91,0.25);
    transition: transform 0.15s ease;
  }
  .thumb-link:hover .thumb {
    transform: scale(1.03);
  }

  .lightbox-overlay {
    position: fixed;
    inset: 0;
    background: rgba(20,19,40,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 999;
    cursor: pointer;
  }
  .lightbox-overlay.visible {
    display: flex;
  }
  .lightbox-overlay img {
    max-width: 92vw;
    max-height: 90vh;
    border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  p.lead {
    font-size: 1.05em;
    line-height: 1.5;
    margin: 0 0 8px;
  }

  .submit-box {
    background: rgb(244,244,255);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 8px;
  }

  .submit-box h2 {
    font-size: 1.1em;
    margin: 0 0 12px;
  }

  .field-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  #country-select, #city-input {
    font-family: 'Factora', Georgia, serif;
    font-size: 1em;
    color: rgb(45,44,91);
    border: 2px solid rgb(45,44,91);
    border-radius: 10px;
    padding: 10px 14px;
    outline: none;
    background: #fff;
  }

  #country-select { flex: 1 1 0; min-width: 0; }
  #city-input { flex: 1 1 0; min-width: 0; }

  .btn {
    font-family: 'Factora', Georgia, serif;
    font-size: 0.95em;
    font-weight: bold;
    padding: 10px 22px;
    border-radius: 999px;
    border: none;
    background: rgb(45,44,91);
    color: #fff;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.5; cursor: default; }

  .btn.btn-small {
    font-size: 0.85em;
    padding: 7px 16px;
  }

  .status-msg {
    margin-top: 10px;
    font-size: 0.9em;
  }
  .status-msg.ok { color: #2f7d4f; }
  .status-msg.err { color: #b33; }

  .map-wrap {
    margin-top: 4px;
  }

  .map-stage {
    position: relative;
  }

  #map-svg-container {
    line-height: 0;
    cursor: grab;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #map-svg-container.dragging {
    cursor: grabbing;
  }
  #map-svg-container svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .zoom-controls {
    position: absolute;
    left: 10px;
    bottom: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 2;
  }
  .zoom-btn {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: none;
    background: rgba(45,44,91,0.85);
    color: #fff;
    font-size: 1.3em;
    font-weight: bold;
    line-height: 1;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .zoom-btn:hover {
    opacity: 0.85;
  }
  #map-svg-container path {
    fill: rgb(230,229,240);
    stroke: #ffffff;
    stroke-width: 0.6;
    transition: fill 0.2s;
  }
  #map-svg-container path.country-active {
    cursor: pointer;
    transition: opacity 0.15s;
  }
  #map-svg-container path.country-active:hover {
    opacity: 0.8;
  }

  .map-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    min-height: 32px;
    flex-wrap: wrap;
  }

  .back-btn {
    display: none;
  }
  .back-btn.visible {
    display: inline-block;
  }

  .map-hint {
    font-size: 1.05em;
    line-height: 1.5;
  }

  .country-list-toggle {
    display: inline-block;
    margin-top: 8px;
    padding: 0;
    border: none;
    background: none;
    font-family: 'Factora', Georgia, serif;
    font-size: 1.05em;
    font-weight: normal;
    color: rgb(45,44,91);
    text-decoration: underline;
    cursor: pointer;
  }
  .country-list-toggle:hover {
    opacity: 0.8;
  }

  .country-list-panel {
    background: rgb(244,244,255);
    border-radius: 16px;
    padding: 6px 20px;
    margin-top: 10px;
    display: none;
    max-height: 340px;
    overflow-y: auto;
  }
  .country-list-panel.visible { display: block; }

  .country-list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 0.85em;
    color: rgb(45,44,91);
    opacity: 0.65;
    border-bottom: 1px solid rgb(230,229,240);
  }
  .country-list-header .col-readers {
    min-width: 60px;
    text-align: right;
    padding-right: 22px;
  }

  .country-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid rgb(230,229,240);
    cursor: pointer;
  }
  .country-row:last-of-type {
    border-bottom: none;
  }
  .country-row .name {
    flex: 1;
  }
  .country-row .row-right {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 60px;
    justify-content: flex-end;
  }
  .country-row .count {
    font-weight: bold;
  }
  .country-row .chevron {
    display: inline-block;
    width: 14px;
    text-align: center;
    flex-shrink: 0;
    transition: transform 0.15s ease;
  }
  .country-row.expanded .chevron {
    transform: rotate(90deg);
  }

  .city-sublist {
    display: none;
    padding: 0 0 12px 18px;
  }
  .city-sublist.expanded {
    display: block;
  }
  .city-sublist ul {
    margin: 0;
    padding-left: 16px;
  }
  .city-sublist li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
    font-size: 0.95em;
  }
  .city-sublist li .city-count {
    font-weight: bold;
    min-width: 60px;
    padding-right: 22px;
    text-align: right;
  }

  .country-list-empty {
    font-size: 0.95em;
    opacity: 0.7;
    padding: 10px 0;
    margin: 0;
  }

  .city-panel {
    background: rgb(244,244,255);
    border-radius: 16px;
    padding: 18px 20px;
    margin-top: 10px;
    display: none;
  }
  .city-panel.visible { display: block; }
  .city-panel h3 {
    margin: 0 0 4px;
    font-size: 1.15em;
  }
  .city-panel .total {
    font-size: 0.9em;
    opacity: 0.75;
    margin: 0 0 10px;
  }
  .city-panel ul {
    margin: 0;
    padding-left: 20px;
  }
  .city-panel li {
    margin-bottom: 5px;
  }
  .city-panel .city-count {
    font-weight: bold;
  }

  .attribution {
    font-size: 0.78em;
    opacity: 0.55;
    margin-top: 18px;
    line-height: 1.5;
  }
  .attribution a {
    color: inherit;
  }

  .empty, .loading {
    font-size: 0.95em;
    opacity: 0.7;
    margin-top: 8px;
  }
</style>
</head>

<div class="wrap">

  <div class="topbar">
    <a class="thumb-link" id="thumb-link">
      <img class="thumb" src="/images/posts/karta.png" alt="Карта читателей — миниатюра, нажми, чтобы увеличить">
    </a>
    <h1 id="title">Карта читателей</h1>
    <a class="home-button" href="https://adorelanguages.com"><span class="arrow">←</span>На главную<br>страницу</a>
  </div>

  <p class="lead">А где ты обожаешь языки? Отметь свою страну и город – и появись на карте читателей блога.</p>

  <div class="submit-box">
    <h2>Отметиться на карте</h2>
    <div class="field-row">
      <select id="country-select">
        <option value="" disabled selected>Выбери страну</option>
      </select>
      <input type="text" id="city-input" maxlength="60" placeholder="Город">
    </div>
    <button class="btn" id="submit-btn" onclick="submitLocation()">Отметиться</button>
    <div class="status-msg" id="submit-status"></div>
  </div>

  <div class="map-wrap">
    <div class="map-stage">
      <div id="map-svg-container">
        <p class="loading">Загружаю карту…</p>
      </div>
      <div class="zoom-controls">
        <button type="button" class="zoom-btn" id="zoom-in-btn" aria-label="Приблизить">+</button>
        <button type="button" class="zoom-btn" id="zoom-out-btn" aria-label="Отдалить">&minus;</button>
      </div>
    </div>
    <div class="map-controls">
      <span class="map-hint">Нажми на свою страну – и увидишь города</span>
      <button class="btn btn-small back-btn" id="back-btn" onclick="resetMap()">← Ко всей карте</button>
    </div>
    <button type="button" class="country-list-toggle" id="country-list-toggle-btn">Список стран</button>
    <div class="country-list-panel" id="country-list-panel">
      <div class="country-list-header">
        <span>Страна / город</span>
        <span class="col-readers">Читателей</span>
      </div>
      <div id="country-accordion"></div>
    </div>
    <div class="city-panel" id="city-panel">
      <h3 id="city-panel-title"></h3>
      <p class="total" id="city-panel-total"></p>
      <ul id="city-panel-list"></ul>
    </div>
  </div>

  <p class="attribution">
    Карта: <a href="https://github.com/VictorCazanave/svg-maps" target="_blank" rel="noopener">svg-maps</a> (Victor Cazanave), лицензия <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a>.
  </p>

</div>

<div class="lightbox-overlay" id="lightbox-overlay">
  <img src="/images/posts/karta.png" alt="Карта читателей">
</div>

<script>
  const thumbLink = document.getElementById('thumb-link');
  const lightbox = document.getElementById('lightbox-overlay');
  thumbLink.addEventListener('click', (e) => {
    e.preventDefault();
    lightbox.classList.add('visible');
  });
  lightbox.addEventListener('click', () => {
    lightbox.classList.remove('visible');
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') lightbox.classList.remove('visible');
  });
</script>

id":"tw","ru":"Тайвань"},{"id":"tz","ru":"Танзания"},{"id":"tg","ru":"Того"},{"id":"tk","ru":"Токелау"},{"id":"to","ru":"Тонга"},{"id":"tt","ru":"Тринидад и Тобаго"},{"id":"tv","ru":"Тувалу"},{"id":"tn","ru":"Тунис"},{"id":"tm","ru":"Туркменистан"},{"id":"tr","ru":"Турция"},{"id":"ug","ru":"Уганда"},{"id":"uz","ru":"Узбекистан"},{"id":"ua","ru":"Украина"},{"id":"wf","ru":"Уоллис и Футуна"},{"id":"uy","ru":"Уругвай"},{"id":"fo","ru":"Фарерские о-ва"},{"id":"fm","ru":"Федеративные Штаты Микронезии"},{"id":"fj","ru":"Фиджи"},{"id":"ph","ru":"Филиппины"},{"id":"fi","ru":"Финляндия"},{"id":"fk","ru":"Фолклендские о-ва"},{"id":"fr","ru":"Франция"},{"id":"gf","ru":"Французская Гвиана"},{"id":"pf","ru":"Французская Полинезия"},{"id":"tf","ru":"Французские Южные территории"},{"id":"hr","ru":"Хорватия"},{"id":"cf","ru":"Центрально-Африканская Республика"},{"id":"td","ru":"Чад"},{"id":"me","ru":"Черногория"},{"id":"cz","ru":"Чехия"},{"id":"cl","ru":"Чили"},{"id":"ch","ru":"Швейцария"},{"id":"se","ru":"Швеция"},{"id":"sj","ru":"Шпицберген и Ян-Майен"},{"id":"lk","ru":"Шри-Ланка"},{"id":"ec","ru":"Эквадор"},{"id":"gq","ru":"Экваториальная Гвинея"},{"id":"er","ru":"Эритрея"},{"id":"sz","ru":"Эсватини"},{"id":"ee","ru":"Эстония"},{"id":"et","ru":"Эфиопия"},{"id":"gs","ru":"Южная Георгия и Южные Сандвичевы о-ва"},{"id":"za","ru":"Южно-Африканская Республика"},{"id":"ss","ru":"Южный Судан"},{"id":"jm","ru":"Ямайка"},{"id":"jp","ru":"Япония"},{"id":"bv","ru":"о-в Буве"},{"id":"im","ru":"о-в Мэн"},{"id":"nf","ru":"о-в Норфолк"},{"id":"cx","ru":"о-в Рождества"},{"id":"sh","ru":"о-в Св. Елены"},{"id":"pn","ru":"о-ва Питкэрн"},{"id":"tc","ru":"о-ва Тёркс и Кайкос"},{"id":"hm","ru":"о-ва Херд и Макдональд"}];

  const COUNTRY_NAME = {};
  COUNTRIES.forEach(c => { COUNTRY_NAME[c.id] = c.ru; });

  const countrySelect = document.getElementById('country-select');
  COUNTRIES.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.ru;
    countrySelect.appendChild(opt);
  });

  let svgEl = null;
  let mapContainer = null;
  let latestCountries = {};
  let originalVB = { x: 0, y: 0, w: 1010, h: 666 };
  let currentVB = { x: 0, y: 0, w: 1010, h: 666 };
  const MIN_VB_WIDTH = 12;
  let wasDragged = false;
  let listenersAttached = false;

  function parseViewBox(str) {
    const parts = (str || '0 0 1010 666').trim().split(/\s+/).map(Number);
    return { x: parts[0], y: parts[1], w: parts[2], h: parts[3] };
  }

  function viewBoxString(vb) {
    return `${vb.x} ${vb.y} ${vb.w} ${vb.h}`;
  }

  function applyViewBox() {
    if (!svgEl) return;
    svgEl.setAttribute('viewBox', viewBoxString(currentVB));
    const changed = Math.abs(currentVB.x - originalVB.x) > 0.5 ||
      Math.abs(currentVB.y - originalVB.y) > 0.5 ||
      Math.abs(currentVB.w - originalVB.w) > 0.5;
    document.getElementById('back-btn').classList.toggle('visible', changed);
  }

  function clampPan() {
    const marginX = currentVB.w * 0.9;
    const marginY = currentVB.h * 0.9;
    const minX = originalVB.x - marginX;
    const maxX = originalVB.x + originalVB.w - currentVB.w + marginX;
    const minY = originalVB.y - marginY;
    const maxY = originalVB.y + originalVB.h - currentVB.h + marginY;
    currentVB.x = Math.max(minX, Math.min(currentVB.x, maxX));
    currentVB.y = Math.max(minY, Math.min(currentVB.y, maxY));
  }

  function zoomBy(factor, cx, cy) {
    let newW = currentVB.w * factor;
    newW = Math.max(MIN_VB_WIDTH, Math.min(newW, originalVB.w));
    const newH = newW * (originalVB.h / originalVB.w);
    const ratio = newW / currentVB.w;
    currentVB = {
      x: cx - (cx - currentVB.x) * ratio,
      y: cy - (cy - currentVB.y) * ratio,
      w: newW,
      h: newH
    };
    clampPan();
    applyViewBox();
  }

  function svgPointFromEvent(clientX, clientY) {
    const rect = svgEl.getBoundingClientRect();
    const scale = currentVB.w / rect.width;
    return {
      x: currentVB.x + (clientX - rect.left) * scale,
      y: currentVB.y + (clientY - rect.top) * scale
    };
  }

  function dist(t1, t2) {
    return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
  }

  function attachMapInteractions() {
    if (listenersAttached || !mapContainer) return;
    listenersAttached = true;

    document.getElementById('zoom-in-btn').addEventListener('click', () => {
      zoomBy(1 / 1.4, currentVB.x + currentVB.w / 2, currentVB.y + currentVB.h / 2);
    });
    document.getElementById('zoom-out-btn').addEventListener('click', () => {
      zoomBy(1.4, currentVB.x + currentVB.w / 2, currentVB.y + currentVB.h / 2);
    });

    mapContainer.addEventListener('wheel', (e) => {
      if (!svgEl) return;
      e.preventDefault();
      const p = svgPointFromEvent(e.clientX, e.clientY);
      const factor = e.deltaY > 0 ? 1.15 : 1 / 1.15;
      zoomBy(factor, p.x, p.y);
    }, { passive: false });

    mapContainer.addEventListener('dblclick', (e) => {
      if (!svgEl) return;
      const p = svgPointFromEvent(e.clientX, e.clientY);
      zoomBy(1 / 1.8, p.x, p.y);
    });

    let dragging = false;
    let dragStartClient = null;
    let dragStartVB = null;
    let dragMoved = 0;

    mapContainer.addEventListener('mousedown', (e) => {
      if (!svgEl) return;
      dragging = true;
      dragMoved = 0;
      dragStartClient = { x: e.clientX, y: e.clientY };
      dragStartVB = { ...currentVB };
      mapContainer.classList.add('dragging');
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragging || !svgEl) return;
      const rect = svgEl.getBoundingClientRect();
      const scale = dragStartVB.w / rect.width;
      const dx = (e.clientX - dragStartClient.x) * scale;
      const dy = (e.clientY - dragStartClient.y) * scale;
      dragMoved = Math.max(dragMoved, Math.hypot(e.clientX - dragStartClient.x, e.clientY - dragStartClient.y));
      currentVB.x = dragStartVB.x - dx;
      currentVB.y = dragStartVB.y - dy;
      clampPan();
      applyViewBox();
    });
    window.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      mapContainer.classList.remove('dragging');
      wasDragged = dragMoved > 5;
    });

    let touchMode = null;
    let touchStartClient = null;
    let touchStartVB = null;
    let pinchStartDist = null;
    let pinchMidSvg = null;
    let touchMoved = 0;

    mapContainer.addEventListener('touchstart', (e) => {
      if (!svgEl) return;
      if (e.touches.length === 1) {
        touchMode = 'pan';
        touchMoved = 0;
        touchStartClient = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        touchStartVB = { ...currentVB };
      } else if (e.touches.length === 2) {
        touchMode = 'pinch';
        const [t1, t2] = e.touches;
        pinchStartDist = dist(t1, t2);
        touchStartVB = { ...currentVB };
        const midX = (t1.clientX + t2.clientX) / 2;
        const midY = (t1.clientY + t2.clientY) / 2;
        pinchMidSvg = svgPointFromEvent(midX, midY);
      }
    }, { passive: false });

    mapContainer.addEventListener('touchmove', (e) => {
      if (!svgEl) return;
      e.preventDefault();
      if (touchMode === 'pan' && e.touches.length === 1) {
        const rect = svgEl.getBoundingClientRect();
        const scale = touchStartVB.w / rect.width;
        const dx = (e.touches[0].clientX - touchStartClient.x) * scale;
        const dy = (e.touches[0].clientY - touchStartClient.y) * scale;
        touchMoved = Math.max(touchMoved, Math.hypot(e.touches[0].clientX - touchStartClient.x, e.touches[0].clientY - touchStartClient.y));
        currentVB.x = touchStartVB.x - dx;
        currentVB.y = touchStartVB.y - dy;
        clampPan();
        applyViewBox();
      } else if (touchMode === 'pinch' && e.touches.length === 2) {
        const [t1, t2] = e.touches;
        const d = dist(t1, t2);
        const factor = pinchStartDist / d;
        let newW = Math.max(MIN_VB_WIDTH, Math.min(touchStartVB.w * factor, originalVB.w));
        const newH = newW * (originalVB.h / originalVB.w);
        const ratio = newW / touchStartVB.w;
        currentVB = {
          x: pinchMidSvg.x - (pinchMidSvg.x - touchStartVB.x) * ratio,
          y: pinchMidSvg.y - (pinchMidSvg.y - touchStartVB.y) * ratio,
          w: newW,
          h: newH
        };
        touchMoved = 999;
        clampPan();
        applyViewBox();
      }
    }, { passive: false });

    mapContainer.addEventListener('touchend', (e) => {
      wasDragged = touchMoved > 5;
      if (e.touches.length === 1) {
        touchMode = 'pan';
        touchMoved = 0;
        touchStartClient = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        touchStartVB = { ...currentVB };
      } else if (e.touches.length === 0) {
        touchMode = null;
      }
    });
  }

  function submitLocation() {
    const country = countrySelect.value;
    const cityInput = document.getElementById('city-input');
    const city = cityInput.value.trim();
    const status = document.getElementById('submit-status');
    const btn = document.getElementById('submit-btn');

    if (!country) {
      status.textContent = 'Сначала выбери страну.';
      status.className = 'status-msg err';
      return;
    }
    if (!city) {
      status.textContent = 'Напиши свой город.';
      status.className = 'status-msg err';
      return;
    }

    btn.disabled = true;
    status.textContent = 'Спасибо! Скоро появишься на карте.';
    status.className = 'status-msg ok';

    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'submit_location', country: country, city: city })
    })
      .then(r => r.json())
      .then(data => {
        btn.disabled = false;
        if (data.ok) {
          cityInput.value = '';
          loadMap();
        } else {
          status.textContent = 'Что-то пошло не так, попробуй ещё раз.';
          status.className = 'status-msg err';
        }
      })
      .catch(() => {
        btn.disabled = false;
        status.textContent = 'Не удалось отправить, попробуй ещё раз.';
        status.className = 'status-msg err';
      });
  }

  function colorForCount(count) {
    return 'rgb(45,44,91)';
  }

  function applyLocationData(countries) {
    if (!svgEl) return;
    const paths = svgEl.querySelectorAll('path[id]');
    paths.forEach(path => {
      const info = countries[path.id];
      path.classList.remove('country-empty', 'country-active');
      path.onclick = null;
      if (info && info.count > 0) {
        path.classList.add('country-active');
        path.style.fill = colorForCount(info.count);
        path.addEventListener('click', () => {
          if (wasDragged) { wasDragged = false; return; }
          showCountry(path.id, info);
        });
      } else {
        path.classList.add('country-empty');
        path.style.fill = '';
      }
    });
  }

  function showCountry(id, info) {
    if (!svgEl) return;
    const path = svgEl.querySelector(`path[id="${id}"]`);
    if (!path) return;

    const bbox = path.getBBox();
    const padX = Math.max(bbox.width * 0.25, 6);
    const padY = Math.max(bbox.height * 0.25, 6);
    currentVB = { x: bbox.x - padX, y: bbox.y - padY, w: bbox.width + padX * 2, h: bbox.height + padY * 2 };
    applyViewBox();

    const panel = document.getElementById('city-panel');
    document.getElementById('city-panel-title').textContent = COUNTRY_NAME[id] || path.getAttribute('aria-label') || '';
    document.getElementById('city-panel-total').textContent = `Читателей: ${info.count}`;

    const list = document.getElementById('city-panel-list');
    list.innerHTML = '';
    buildCityListItems(info).forEach(li => list.appendChild(li));

    panel.classList.add('visible');
    panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function resetMap() {
    currentVB = { ...originalVB };
    applyViewBox();
    document.getElementById('city-panel').classList.remove('visible');
  }

  function loadMapSvg() {
    return fetch('/maps/world.svg')
      .then(r => r.text())
      .then(svgText => {
        mapContainer = document.getElementById('map-svg-container');
        mapContainer.innerHTML = svgText;
        svgEl = mapContainer.querySelector('svg');
        if (svgEl) {
          originalVB = parseViewBox(svgEl.getAttribute('viewBox'));
          currentVB = { ...originalVB };
          svgEl.removeAttribute('height');
          svgEl.removeAttribute('width');
          attachMapInteractions();
        }
      });
  }

  function loadLocationData() {
    return fetch(`${API_URL}?action=get_locations&_=${Date.now()}`, { cache: 'no-store' })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          latestCountries = data.countries || {};
          applyLocationData(latestCountries);
          renderCountryList();
        }
      });
  }

  function buildCityListItems(info) {
    const cities = Object.keys(info.cities).map(name => ({ name: name, count: info.cities[name] }));
    cities.sort((a, b) => b.count - a.count);
    return cities.map(c => {
      const li = document.createElement('li');
      const nameSpan = document.createElement('span');
      nameSpan.appendChild(document.createTextNode(c.name));
      li.appendChild(nameSpan);
      const countSpan = document.createElement('span');
      countSpan.className = 'city-count';
      countSpan.textContent = c.count;
      li.appendChild(countSpan);
      return li;
    });
  }

  function renderCountryList() {
    const container = document.getElementById('country-accordion');
    const entries = Object.keys(latestCountries)
      .map(id => ({ id: id, count: latestCountries[id].count, name: COUNTRY_NAME[id] || id }))
      .sort((a, b) => a.name.localeCompare(b.name, 'ru'));

    container.innerHTML = '';
    if (!entries.length) {
      const p = document.createElement('p');
      p.className = 'country-list-empty';
      p.textContent = 'Пока никто не отметился.';
      container.appendChild(p);
      return;
    }

    entries.forEach(entry => {
      const info = latestCountries[entry.id];

      const row = document.createElement('div');
      row.className = 'country-row';
      const nameSpan = document.createElement('span');
      nameSpan.className = 'name';
      nameSpan.textContent = entry.name;
      row.appendChild(nameSpan);

      const rightSpan = document.createElement('span');
      rightSpan.className = 'row-right';
      const countSpan = document.createElement('span');
      countSpan.className = 'count';
      countSpan.textContent = entry.count;
      rightSpan.appendChild(countSpan);
      const chevron = document.createElement('span');
      chevron.className = 'chevron';
      chevron.textContent = '\u203a';
      rightSpan.appendChild(chevron);
      row.appendChild(rightSpan);

      const sub = document.createElement('div');
      sub.className = 'city-sublist';
      const ul = document.createElement('ul');
      buildCityListItems(info).forEach(li => ul.appendChild(li));
      sub.appendChild(ul);

      row.addEventListener('click', () => {
        const willExpand = !sub.classList.contains('expanded');
        sub.classList.toggle('expanded', willExpand);
        row.classList.toggle('expanded', willExpand);
      });

      container.appendChild(row);
      container.appendChild(sub);
    });
  }

  document.getElementById('country-list-toggle-btn').addEventListener('click', () => {
    const panel = document.getElementById('country-list-panel');
    const btn = document.getElementById('country-list-toggle-btn');
    const willShow = !panel.classList.contains('visible');
    panel.classList.toggle('visible', willShow);
    btn.textContent = willShow ? 'Скрыть список стран' : 'Список стран';
    if (willShow) {
      panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  });

  function loadMap() {
    if (!svgEl) {
      loadMapSvg().then(loadLocationData);
    } else {
      loadLocationData();
    }
  }

  loadMap();
</script>
