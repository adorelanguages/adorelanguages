<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обожаю Языки</title>
  <style>
    @font-face {
      font-family: 'Factora';
      src: url('FACTORA-REGULAR.OTF');
      font-weight: normal;
    }
    @font-face {
      font-family: 'Factora';
      src: url('FACTORA-BOLD.OTF');
      font-weight: bold;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Factora', Georgia, serif; background: #ffffff; color: #222; }
    .banner { width: 100%; max-height: 300px; object-fit: contain; display: block; }
    .container { max-width: 680px; margin: 0 auto; padding: 40px 20px; text-align: center; }
    h1 { font-size: 2em; font-weight: bold; margin-bottom: 10px; color: #222; }
    p.desc { color: #666; margin-bottom: 40px; font-size: 1.1em; }
    .links { display: flex; flex-direction: column; gap: 16px; margin-bottom: 40px; }
    .links a {
      display: block; padding: 16px 24px; border-radius: 8px;
      text-decoration: none; font-size: 1.1em; font-weight: bold;
      transition: opacity 0.2s;
    }
    .links a:hover { opacity: 0.85; }
    .fb { background: #1877f2; color: #fff; }
    .ig { background: #e1306c; color: #fff; }
    .tg { background: #0088cc; color: #fff; }
    .contact { color: #888; font-size: 0.95em; }
    .contact a { color: #1877f2; text-decoration: none; }
  </style>
</head>
<body>
  <img src="dog.jpg" alt="Обожаю Языки" class="banner">
  <div class="container">
    <h1>Обожаю Языки</h1>
    <p class="desc">Блог о языках, лингвистике и всём, что с ними связано</p>
    <div class="links">
      <a href="https://www.facebook.com/AdoreLanguages" class="fb">📘 Facebook</a>
      <a href="https://www.instagram.com/adore_languages/" class="ig">📷 Instagram</a>
      <a href="https://t.me/AdoreLanguages" class="tg">✈️ Telegram</a>
    </div>
    <p class="contact">Связаться: <a href="mailto:adore.languages@gmail.com">adore.languages@gmail.com</a></p>
  </div>
</body>
</html>
