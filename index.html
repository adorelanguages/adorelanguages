<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обожаю Языки</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @font-face {
      font-family: 'Factora';
      src: url('FACTORA-REGULAR.OTF');
      font-weight: normal;
    }
    @font-face {
      font-family: 'Factora';
      src: url('FACTORA-BOLD.OTF');
      font-weight: bold;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Factora', Georgia, serif; background: #ffffff; color: #222; }
    .banner { width: 100%; max-height: 300px; object-fit: contain; display: block; }
    .container { max-width: 680px; margin: 0 auto; padding: 40px 20px; text-align: center; }
    h1 { font-size: 2em; font-weight: bold; margin-bottom: 10px; color: rgb(45, 44, 91); }
    p.desc { color: rgb(45, 44, 91); margin-bottom: 40px; font-size: 1.1em; }
    .links { display: flex; flex-direction: column; gap: 16px; margin-bottom: 40px; }
    .links a {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 16px 24px; border-radius: 8px;
      text-decoration: none; font-size: 1.1em; font-weight: bold;
      transition: opacity 0.2s;
    }
    .links a:hover { opacity: 0.85; }
    .links a i { font-size: 1.3em; }
    .fb { background: rgb(244, 219, 206); color: rgb(45, 44, 91); }
    .ig { background: rgb(233, 206, 242); color: rgb(45, 44, 91); }
    .tg { background: rgb(70, 19, 89); color: rgb(129, 239, 135); }
    .contact { color: rgb(45, 44, 91); font-size: 0.95em; margin-bottom: 16px; }
    .contact a { color: rgb(45, 44, 91); text-decoration: none; }
    .support { color: rgb(45, 44, 91); font-size: 0.95em; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .support a { display: inline-block; }
    .support a:hover { opacity: 0.85; }
    .support img { height: 40px; }
  </style>
</head>
<body>
  <img src="dog.jpg" alt="Обожаю Языки" class="banner">
  <div class="container">
    <h1>#ОбожаюЯзыки</h1>
    <p class="desc">Блог о языках, лингвистике и всём, что с ними связано</p>
    <div class="links">
      <a href="https://www.facebook.com/AdoreLanguages" class="fb">
        <i class="fa-brands fa-facebook"></i> Facebook
      </a>
      <a href="https://www.instagram.com/adore_languages/" class="ig">
        <i class="fa-brands fa-instagram"></i> Instagram
      </a>
      <a href="https://t.me/AdoreLanguages" class="tg">
        <i class="fa-brands fa-telegram"></i> Telegram
      </a>
    </div>
    <p class="contact">Связаться: <a href="mailto:adore.languages@gmail.com">adore.languages@gmail.com</a></p>
    <p class="support">Поддержать:
      <a href="https://buymeacoffee.com/adorelanguages" target="_blank">
        <img src="https://cdn.buymeacoffee.com/buttons/v2/default-yellow.png" alt="Buy Me A Coffee">
      </a>
    </p>
  </div>
</body>
</html>
