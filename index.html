  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    @font-face {
      font-family: 'Factora';
      src: url('FACTORA-REGULAR.OTF');
      font-weight: normal;
    }
    @font-face {
      font-family: 'Factora';
      src: url('FACTORA-BOLD.OTF');
      font-weight: bold;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Factora', Georgia, serif; background: #ffffff; color: #222; }

    .banner { width: 100%; max-height: 300px; object-fit: contain; display: block; }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
    }

    h1 {
      font-size: 2.6em;
      font-weight: bold;
      margin-bottom: 10px;
      color: rgb(45, 44, 91);
      text-align: center;
    }

    p.desc {
      color: rgb(45, 44, 91);
      margin-bottom: 40px;
      font-size: 1.35em;
      text-align: center;
    }

    .search-row {
      display: flex;
      justify-content: center;
      margin-bottom: 60px;
      position: relative;
    }

    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    .search-button {
      width: 100px;
      height: 100px;
      background: transparent;
      color: rgb(45,44,91);
      border: 3px solid rgb(45,44,91);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .search-button:hover { opacity: 0.7; }

    .search-link, .search-arrow {
      display: none;
    }

    .search-wrapper.visible .search-link,
    .search-wrapper.visible .search-arrow {
      display: inline-flex;
      align-items: center;
    }

    .search-arrow {
      color: rgb(45,44,91);
      font-size: 1.3em;
    }

    .search-link {
      padding: 8px 12px;
      text-decoration: none;
      color: rgb(45,44,91);
      font-size: 0.9em;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: rgb(244,244,255);
      white-space: nowrap;

      width: 110px;
      text-align: center;

      /* ⭐ Добавлено — теперь текст строго по центру */
      justify-content: center;
    }

    .search-link:hover {
      background: rgb(230,230,255);
    }

    .social-title {
      color: rgb(45,44,91);
      font-size: 1.1em;
      margin-bottom: 10px;
      text-align: left;
    }

    .social-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .links {
      display: flex;
      flex-direction: row;
      gap: 12px;
      width: 100%;
      justify-content: space-between;
    }

    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9em;
      font-weight: bold;
      transition: opacity 0.2s;
      white-space: nowrap;
      width: 30%;
      min-width: 90px;
    }

    .links a:hover { opacity: 0.85; }
    .links a i { font-size: 1.2em; }

    .fb { background: rgb(244, 219, 206); color: rgb(45, 44, 91); }
    .ig { background: rgb(233, 206, 242); color: rgb(45, 44, 91); }
    .tg { background: rgb(70, 19, 89); color: rgb(129, 239, 135); }

    .bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }

    .bottom-row a {
      font-size: 1.1em;
      font-weight: bold;
      color: rgb(45, 44, 91);
      text-decoration: underline;

  <script>
    function toggleSearchMenu() {
      const wrapper = document.getElementById("search-wrapper");
      wrapper.classList.toggle("visible");

        <a href="https://www.instagram.com/adore_languages/" class="ig">

        <a href="https://t.me/AdoreLanguages" class="tg">

        </a>
